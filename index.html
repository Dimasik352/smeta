<!DOCTYPE html>
<html lang="ru">
<head>

    <style>

        .report-card { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        
        .tabs-nav { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 4px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.2s; color: #555; font-size: 12px; text-transform: uppercase; }
        .tab-btn.active { background: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .header { border-bottom: 3px solid #2c3e50; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
        .header h1 { margin: 0; font-size: 18px; color: #2c3e50; text-transform: uppercase; }
        
        .master-info { text-align: right; font-size: 12px; color: #2c3e50; flex-grow: 1; }
        .master-info input { border: none; background: transparent; text-align: right; font-family: inherit; color: #2c3e50; width: 100%; max-width: 220px; border-bottom: 1px solid transparent; padding: 2px 0; }
        
        .client-block { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; }
        .client-block label { font-weight: bold; color: #666; font-size: 10px; text-transform: uppercase; }
        .client-block input { border: none; background: transparent; font-size: 14px; width: 100%; border-bottom: 1px solid #ddd; padding: 5px 0; }
        
        .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; min-width: 650px; }
        th { background: #f4f6f8; color: #333; padding: 10px 5px; text-align: left; font-size: 10px; border-bottom: 2px solid #2c3e50; text-transform: uppercase; }
        td { border-bottom: 1px solid #eee; padding: 8px 5px; font-size: 13px; position: relative; }
        
        .cat-row { background: #f9f9f9; font-weight: bold; color: #2c3e50; }
        .cat-input { width: 85%; border: none; background: transparent; font-weight: bold; font-size: 14px; }
        
        .input-qty { width: 45px; border: 1px dashed #3498db; padding: 4px; border-radius: 4px; text-align: center; }
        .input-custom { width: 60px; border: none; border-bottom: 1px dotted #ccc; text-align: right; background: transparent; }
        .input-name { width: 95%; border: none; border-bottom: 1px solid #eee; background: transparent; }
        .input-art { width: 95%; border: none; border-bottom: 1px dotted #ccc; font-size: 12px; color: #555; }
        
        .btn-del { color: #e74c3c; cursor: pointer; font-weight: bold; font-size: 18px; border: none; background: none; opacity: 0.3; }
        .btn-del:hover { opacity: 1; }

        .sticky-summary { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .grand-total { grid-column: span 2; border-top: 1px solid #444; padding-top: 10px; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .grand-total span { color: #2ecc71; font-size: 24px; }
        
        .action-btns { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; flex-grow: 1; color: white; }
        .btn-add { background: #3498db; }
        .btn-cat { background: #95a5a6; }
        .btn-reset { background: #e74c3c; }
        .btn-print-main { background: #2ecc71; color: white; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 18px; margin-top: 20px; border: none; cursor: pointer; }
        
        body.mode-purchase .col-price, 
        body.mode-purchase .col-sum,
        body.mode-purchase .hide-on-purchase { display: none !important; }
        
        .qty-text, .price-text, .name-text, .art-text, .cat-text, .unit-text, .master-text { display: none; }

        @media print {
            .tabs-nav, .action-btns, .btn-del, input, select, .btn-print-main, .print-options { display: none !important; }
            .qty-text, .price-text, .name-text, .art-text, .cat-text, .unit-text, .row-sum, .master-text { display: inline !important; font-weight: bold; }
            tr.zero-row { display: none !important; }
            .sticky-summary { position: relative; background: white !important; color: black !important; border: 2px solid #2c3e50; }
            .grand-total span { color: black !important; }
            .report-card { box-shadow: none; padding: 0; }
        }
    </style>
</head>

<div class="report-card">
    <div class="tabs-nav">
        <button id="tab-btn-works" class="tab-btn active" onclick="showTab('works')">1. РАБОТЫ</button>

    <!-- РАБОТЫ -->

            <div class="master-info">
                <b>Исполнитель:</b><br>
                <input type="text" id="master-name" placeholder="ФИО мастера"><span class="master-text"></span><br>
                <b>Тел:</b><br>
                <input type="text" id="master-phone" placeholder="+7 (___) ___-__-__"><span class="master-text"></span>
            </div>
        </div>
        <div class="client-block">
            <div><label>Заказчик</label><input type="text" id="client-name" placeholder="ФИО"></div>
            <div><label>Телефон</label><input type="text" id="phone" value="+7 "></div>
            <div style="grid-column: span 2;"><label>Адрес объекта</label><input type="text" id="address" placeholder="Укажите адрес"></div>
        </div>
        <div class="table-wrap">
            <table id="table-works">
                <thead>
                    <tr><th style="width: 38%;">Наименование работ</th><th style="width: 12%;">Ед.</th><th style="width: 15%;">Цена</th><th style="width: 10%;">Кол.</th><th style="width: 20%;">Сумма</th><th style="width: 5%;"></th></tr>
                </thead>
                <tbody id="works-body"></tbody>
            </table>
        </div>
        <div class="action-btns">
            <button class="btn btn-add" onclick="addRow('works-body')">+ Работа</button>
            <button class="btn btn-cat" onclick="addCategory()">+ Категория</button>
            <button class="btn btn-reset" onclick="resetData()">Сбросить всё</button>
        </div>
    </div>

    <!-- МАТЕРИАЛЫ -->
    <div id="tab-mats" class="tab-content">
        <div class="header"><h1 id="mats-title">СПИСОК МАТЕРИАЛОВ</h1></div>
        <div class="print-options" style="background:#fdfdfd; padding:10px; border-radius:8px; border:1px solid #eee; margin-bottom:15px; font-size:12px;">
            <b>Режим отчета:</b> &nbsp;
            <label><input type="radio" name="mMode" value="client" checked onclick="setPrintMode('client')"> Для клиента</label> &nbsp;
            <label><input type="radio" name="mMode" value="purchase" onclick="setPrintMode('purchase')"> Для закупа</label>
        </div>
        <div class="table-wrap">
            <table id="table-mats">
                <thead>
                    <tr><th style="width: 28%;">Наименование</th><th style="width: 20%;">Артикул</th><th style="width: 12%;">Ед.</th><th class="col-price" style="width: 13%;">Цена</th><th style="width: 10%;">Кол.</th><th class="col-sum" style="width: 15%;">Сумма</th><th style="width: 5%;"></th></tr>
                </thead>
                <tbody id="mats-body"></tbody>
            </table>
        </div>
        <div class="action-btns">
            <button class="btn btn-add" onclick="addRow('mats-body')">+ Материал</button>
        </div>
    </div>

    <div class="sticky-summary hide-on-purchase">
        <div class="summary-item">Работы: <b id="res-works">0</b> ₽</div>
        <div class="summary-item">Скидка: 
            <select id="discount" style="background:transparent; color:white; border:1px solid #555;">
                <option value="0" style="color:black;">0%</option>
                <option value="5" style="color:black;">5%</option>
                <option value="10" style="color:black;">10%</option>
            </select>
        </div>
        <div class="summary-item" style="grid-column: span 2;">Материалы: <b id="res-mats">0</b> ₽</div>
        <div class="grand-total">ИТОГО: <span id="res-total">0 ₽</span></div>
    </div>
</div>

<div style="max-width: 900px; margin: auto; padding: 0 15px;">

</div>

        { name: "Рамка 2-постовая (белая)", art: "RM-2", unit: "шт.", price: 150 },
        { name: "Рамка 3-постовая (белая)", art: "RM-3", unit: "шт.", price: 220 }
    ];

    function showTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        document.getElementById('tab-btn-' + name).classList.add('active');
    }

    function setPrintMode(mode) {
        document.body.classList.toggle('mode-purchase', mode === 'purchase');
        document.getElementById('mats-title').innerText = mode === 'purchase' ? 'ЗАЯВКА НА ЗАКУП МАТЕРИАЛОВ' : 'СПИСОК МАТЕРИАЛОВ';
    }

    function addRow(targetId, savedData = null) {
        const tbody = document.getElementById(targetId);
        const tr = document.createElement('tr');
        const isWorks = targetId === 'works-body';
        tr.className = isWorks ? 'work-row' : 'mat-row';
        
        let html = `<td><input type="text" class="input-name" value="${savedData?.name || ''}"><span class="name-text"></span></td>`;
        
        if (!isWorks) {
            html += `<td><input type="text" class="input-art" value="${savedData?.art || ''}"><span class="art-text"></span></td>`;
        }
        
        html += `<td>
            <select class="unit-inp" style="width:100%; border:none; background:transparent;">
                <option value="шт." ${savedData?.unit === 'шт.' ? 'selected' : ''}>шт.</option>
                <option value="п.м." ${savedData?.unit === 'п.м.' ? 'selected' : ''}>п.м.</option>
                <option value="усл." ${savedData?.unit === 'усл.' ? 'selected' : ''}>усл.</option>
                <option value="уп." ${savedData?.unit === 'уп.' ? 'selected' : ''}>уп.</option>
            </select><span class="unit-text"></span>
        </td>
        <td class="col-price"><input type="number" value="${savedData?.price || '0'}" class="input-custom unit-p"><span class="price-text"></span></td>
        <td><input type="number" value="${savedData?.qty || '0'}" class="input-qty"><span class="qty-text"></span></td>
        <td class="col-sum" style="text-align:right"><span class="row-sum">0</span> ₽</td>
        <td><button class="btn-del" onclick="this.closest('tr').remove(); calculate();">×</button></td>`;
        
        tr.innerHTML = html;
        tbody.appendChild(tr);
        calculate();
    }

    function addCategory(val = '') {
        const tr = document.createElement('tr');
        tr.className = 'cat-row';
        tr.innerHTML = `<td colspan="5"><input type="text" placeholder="КАТЕГОРИЯ" class="cat-input" value="${val}"><span class="cat-text"></span></td>
                        <td><button class="btn-del" onclick="this.closest('tr').remove(); calculate();">×</button></td>`;
        document.getElementById('works-body').appendChild(tr);
        calculate();
    }

    function calculate() {
        let wSum = 0, mSum = 0;
        
        // Инфо мастера
        const masterName = document.getElementById('master-name').value;
        const masterPhone = document.getElementById('master-phone').value;
        document.querySelectorAll('.master-text').forEach((el, i) => {
            el.innerText = (i === 0 || i === 2) ? masterName : masterPhone;
        });

        document.querySelectorAll('tr.work-row, tr.mat-row, tr.cat-row').forEach(row => {
            if (row.classList.contains('cat-row')) {
                const inp = row.querySelector('.cat-input');
                row.querySelector('.cat-text').innerText = inp ? inp.value.toUpperCase() : '';
                return;
            }

            const pVal = parseFloat(row.querySelector('.unit-p')?.value) || 0;
            const qVal = parseFloat(row.querySelector('.input-qty')?.value) || 0;
            const s = pVal * qVal;

            if(row.querySelector('.row-sum')) row.querySelector('.row-sum').innerText = s.toLocaleString();
            if(row.querySelector('.name-text')) row.querySelector('.name-text').innerText = row.querySelector('.input-name').value;
            if(row.querySelector('.unit-text')) row.querySelector('.unit-text').innerText = row.querySelector('.unit-inp').value;
            if(row.querySelector('.price-text')) row.querySelector('.price-text').innerText = pVal;
            if(row.querySelector('.qty-text')) row.querySelector('.qty-text').innerText = qVal;
            
            const artInp = row.querySelector('.input-art');
            if(artInp && row.querySelector('.art-text')) row.querySelector('.art-text').innerText = artInp.value;

            if (qVal === 0) row.classList.add('zero-row'); else row.classList.remove('zero-row');
            
            if (row.classList.contains('work-row')) wSum += s; else mSum += s;
        });

        const disc = parseInt(document.getElementById('discount').value) || 0;
        const wFinal = Math.round(wSum * (1 - disc/100));
        
        document.getElementById('res-works').innerText = wFinal.toLocaleString();
        document.getElementById('res-mats').innerText = mSum.toLocaleString();
        document.getElementById('res-total').innerText = (wFinal + mSum).toLocaleString() + ' ₽';
        
        saveToStorage();
    }

    function saveToStorage() {
        const data = {
            mName: document.getElementById('master-name').value,
            mPhone: document.getElementById('master-phone').value,
            disc: document.getElementById('discount').value,
            works: Array.from(document.querySelectorAll('#works-body tr')).map(tr => ({
                type: tr.className,
                name: tr.querySelector('.input-name')?.value || tr.querySelector('.cat-input')?.value || '',
                unit: tr.querySelector('.unit-inp')?.value || 'шт.',
                price: tr.querySelector('.unit-p')?.value || '0',
                qty: tr.querySelector('.input-qty')?.value || '0'
            })),
            mats: Array.from(document.querySelectorAll('#mats-body tr')).map(tr => ({
                name: tr.querySelector('.input-name')?.value || '',
                art: tr.querySelector('.input-art')?.value || '',
                unit: tr.querySelector('.unit-inp')?.value || 'шт.',
                price: tr.querySelector('.unit-p')?.value || '0',
                qty: tr.querySelector('.input-qty')?.value || '0'
            }))
        };
        localStorage.setItem('elektro_data_v7', JSON.stringify(data));
    }

    function loadFromStorage() {
        const stored = JSON.parse(localStorage.getItem('elektro_data_v7'));
        if (stored) {
            document.getElementById('master-name').value = stored.mName || '';
            document.getElementById('master-phone').value = stored.mPhone || '';
            document.getElementById('discount').value = stored.disc || '0';
            document.getElementById('works-body').innerHTML = '';
            document.getElementById('mats-body').innerHTML = '';
            stored.works.forEach(w => w.type === 'cat-row' ? addCategory(w.name) : addRow('works-body', w));
            stored.mats.forEach(m => addRow('mats-body', m));
        } else {
            initialWorks.forEach(w => w.type === 'cat' ? addCategory(w.name) : addRow('works-body', w));
            initialMats.forEach(m => addRow('mats-body', m));
        }
        calculate();
    }

    function resetData() {
        if(confirm('Сбросить все данные?')) {
            localStorage.removeItem('elektro_data_v7');
            location.reload();
        }
    }

    window.onload = () => {
        loadFromStorage();
        document.body.addEventListener('input', calculate);
    };
</script>
</body>
</html>
