<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Электромонтаж - Смета и Закуп</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; color: #333; background: #f0f2f5; padding-bottom: 100px; }
        .report-card { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        
        /* ВКЛАДКИ */
        .tabs-nav { display: flex; gap: 8px; margin-bottom: 15px; background: #eee; padding: 4px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.2s; color: #555; font-size: 13px; }
        .tab-btn.active { background: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .header { border-bottom: 3px solid #2c3e50; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { margin: 0; font-size: 18px; color: #2c3e50; text-transform: uppercase; }
        
        .master-info { text-align: right; font-size: 12px; color: #2c3e50; }
        .master-info input { border: none; background: transparent; text-align: right; font-family: inherit; color: #2c3e50; width: 220px; border-bottom: 1px solid transparent; }
        .master-info input:focus { border-bottom: 1px solid #3498db; outline: none; background: #fdfdfd; }
        .master-info b { font-size: 11px; color: #7f8c8d; text-transform: uppercase; }

        .client-block { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; }
        .client-block label { font-weight: bold; color: #666; font-size: 10px; text-transform: uppercase; }
        .client-block input { border: none; background: transparent; font-size: 14px; width: 100%; border-bottom: 1px solid #ddd; padding: 3px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
        th { background: #f4f6f8; color: #333; padding: 10px 5px; text-align: left; font-size: 10px; border-bottom: 2px solid #2c3e50; text-transform: uppercase; }
        td { border-bottom: 1px solid #eee; padding: 8px 5px; font-size: 12px; position: relative; }
        
        .drag-handler { cursor: grab; color: #ccc; padding: 0 5px; font-size: 18px; user-select: none; display: inline-block; position: absolute; left: -25px; top: 50%; transform: translateY(-50%); opacity: 0; transition: 0.2s; }
        tr:hover .drag-handler { opacity: 1; }
        tr.dragging { opacity: 0.3; background: #f0f7ff; }

        .cat-row { background: #f9f9f9; font-weight: bold; color: #2c3e50; font-size: 13px; }
        .cat-input { width: 100%; border: none; background: transparent; font-weight: bold; font-family: inherit; color: #2c3e50; }
        
        .input-qty { width: 35px; border: 1px dashed #3498db; padding: 4px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 13px; }
        .input-price, .input-custom { width: 55px; border: none; border-bottom: 1px dotted #ccc; text-align: right; font-size: 12px; background: transparent; }
        .input-name { width: 95%; border: none; border-bottom: 1px solid #eee; font-family: inherit; font-size: 12px; }
        .input-art { width: 95%; border: none; border-bottom: 1px dotted #ddd; font-family: inherit; font-size: 11px; color: #7f8c8d; }
        
        .sticky-summary { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
        .summary-item { font-size: 12px; }
        .summary-item b { color: #2ecc71; font-size: 14px; }
        .grand-total { grid-column: span 2; border-top: 1px solid #444; padding-top: 10px; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .grand-total span { color: #2ecc71; font-size: 22px; }
        
        .action-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background: #3498db; color: white; }
        .btn-cat { background: #95a5a6; color: white; }
        .btn-reset { background: #e74c3c; color: white; margin-left: auto; }
        .btn-print-main { background: #2ecc71; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; font-size: 18px; margin-top: 20px; }
        .btn-print-mats { background: #27ae60; color: white; }
        
        .signatures { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 30px; }
        .sig-line { border-bottom: 1px solid #000; height: 35px; }

        /* Логика скрытия для режима закупа */
        body.mode-purchase .hide-on-purchase { display: none !important; }
        body.mode-purchase th.col-price, body.mode-purchase td.col-price,
        body.mode-purchase th.col-sum, body.mode-purchase td.col-sum { display: none !important; }

        @media print {
            body { background: white; padding: 0; }
            .report-card { box-shadow: none; max-width: 100%; padding: 0; }
            .tabs-nav, .action-btns, .drag-handler, .input-qty, .input-price, .input-custom, .input-name, .input-art, .cat-input, .discount-select, .btn-print-main, .print-options { display: none !important; }
            .tab-content { display: none !important; }
            .tab-content.active { display: block !important; }
            .qty-text, .price-text, .name-text, .art-text, .cat-text, .unit-text, .master-text { display: inline !important; font-weight: bold; }
            .master-info input { display: none; }
            tr.zero-row { display: none !important; }
            .sticky-summary { position: relative; background: #f8f9fa !important; color: #333 !important; border: 2px solid #2c3e50; margin: 20px 0; }
            .summary-item b, .grand-total span { color: #000 !important; }
        }
        .qty-text, .price-text, .name-text, .art-text, .cat-text, .unit-text, .master-text { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="report-card">
    <div class="tabs-nav">
        <button id="tab-btn-works" class="tab-btn active" onclick="showTab('works')">1. РАБОТЫ</button>
        <button id="tab-btn-mats" class="tab-btn" onclick="showTab('mats')">2. МАТЕРИАЛЫ</button>
    </div>

    <!-- РАБОТЫ -->
    <div id="tab-works" class="tab-content active">
        <div class="header">
            <div><h1>ОТЧЕТ ПО РАБОТАМ</h1><div style="color: #3498db; font-weight: bold; font-size: 11px;">ИЖЕВСК / УДМУРТИЯ</div></div>
            <div class="master-info">
                <b>Исполнитель:</b><br>
                <input type="text" id="master-name" value="Дмитрий Анатольевич Зонов" class="save-val"><span class="master-text"></span><br>
                <b>Тел:</b><br>
                <input type="text" id="master-phone" value="+7 (912) 458-31-48" class="save-val"><span class="master-text"></span>
            </div>
        </div>
        <div class="client-block">
            <div><label>Заказчик</label><input type="text" id="client-name" placeholder="ФИО" class="save-val"></div>
            <div><label>Телефон</label><input type="text" id="phone" value="+7 " class="save-val"></div>
            <div style="grid-column: span 2;"><label>Адрес объекта</label><input type="text" id="address" placeholder="Укажите адрес" class="save-val"></div>
        </div>
        <table id="table-works">
            <thead><tr><th style="width: 45%;">Наименование работ</th><th style="width: 10%;">Ед.</th><th style="width: 15%;">Цена</th><th style="width: 10%;">Кол.</th><th style="width: 20%;">Сумма</th></tr></thead>
            <tbody id="works-body"></tbody>
        </table>
        <div class="action-btns">
            <button class="btn btn-add" onclick="addRow('works-body')">+ Работа</button>
            <button class="btn btn-cat" onclick="addCategory()">+ Категория</button>
            <button class="btn btn-reset" onclick="resetData()">Сбросить всё</button>
        </div>
    </div>

    <!-- МАТЕРИАЛЫ -->
    <div id="tab-mats" class="tab-content">
        <div class="header">
            <h1 id="mats-title">СПИСОК МАТЕРИАЛОВ</h1>
            <div class="master-info"><span id="display-master-name"></span><br><span id="display-master-phone"></span></div>
        </div>
        
        <div class="print-options" style="background:#fdfdfd; padding:10px; border-radius:8px; border:1px solid #eee; margin-bottom:15px; font-size:12px;">
            <b>Вид отчета для печати:</b> &nbsp;
            <label><input type="radio" name="mMode" value="client" checked onclick="setPrintMode('client')"> Для клиента</label> &nbsp;
            <label><input type="radio" name="mMode" value="purchase" onclick="setPrintMode('purchase')"> Для закупа</label>
        </div>

        <table id="table-mats">
            <thead><tr><th style="width: 30%;">Наименование</th><th style="width: 20%;">Артикул / Модель</th><th style="width: 8%;">Ед.</th><th class="col-price" style="width: 12%;">Цена</th><th style="width: 10%;">Кол.</th><th class="col-sum" style="width: 20%;">Сумма</th></tr></thead>
            <tbody id="mats-body"></tbody>
        </table>
        
        <div class="action-btns">
            <button class="btn btn-add" onclick="addRow('mats-body')">+ Материал</button>
            <button class="btn btn-print-mats btn" onclick="window.print()">🖨 Печать материалов</button>
        </div>
    </div>

    <div class="sticky-summary hide-on-purchase">
        <div class="summary-item">За работы: <b id="res-works">0</b> ₽</div>
        <div class="summary-item">Скидка: <select id="discount" class="discount-select save-val" style="background:transparent; color:white; border:1px solid #555;"><option value="0" style="color:black;">0%</option><option value="5" style="color:black;">5%</option><option value="10" style="color:black;">10%</option></select></div>
        <div class="summary-item" style="grid-column: span 2;">За материалы: <b id="res-mats">0</b> ₽</div>
        <div class="grand-total">ИТОГО К ОПЛАТЕ: <span id="res-total">0 ₽</span></div>
    </div>
    
    <div class="signatures">
        <div><div style="font-size: 11px; margin-bottom: 5px;">Исполнитель: <b class="master-name-label">Зонов Д.А.</b></div><div class="sig-line"></div></div>
        <div><div style="font-size: 11px; margin-bottom: 5px;">Заказчик / Менеджер:</div><div class="sig-line"></div></div>
    </div>
</div>

<button class="btn-print-main hide-on-purchase" onclick="window.print()">Сформировать общий отчет (PDF)</button>

<script>
    function showTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        document.getElementById('tab-btn-' + name).classList.add('active');
    }

    function setPrintMode(mode) {
        if(mode === 'purchase') {
            document.body.classList.add('mode-purchase');
            document.getElementById('mats-title').innerText = 'ЗАЯВКА НА ЗАКУП МАТЕРИАЛОВ';
        } else {
            document.body.classList.remove('mode-purchase');
            document.getElementById('mats-title').innerText = 'СПИСОК МАТЕРИАЛОВ';
        }
    }

    function saveToStorage() {
        const data = {
            masterName: document.getElementById('master-name').value,
            masterPhone: document.getElementById('master-phone').value,
            client: document.getElementById('client-name').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            discount: document.getElementById('discount').value,
            works: Array.from(document.querySelectorAll('#works-body tr')).map(tr => ({
                type: tr.className, name: tr.querySelector('.input-name')?.value || tr.querySelector('.cat-input')?.value || '',
                unit: tr.querySelector('.unit-inp')?.value || '', price: tr.querySelector('.unit-p')?.value || '0', qty: tr.querySelector('.input-qty')?.value || '0'
            })),
            mats: Array.from(document.querySelectorAll('#mats-body tr')).map(tr => ({
                name: tr.querySelector('.input-name')?.value || '', art: tr.querySelector('.input-art')?.value || '',
                unit: tr.querySelector('.unit-inp')?.value || '', price: tr.querySelector('.unit-p')?.value || '0', qty: tr.querySelector('.input-qty')?.value || '0'
            }))
        };
        localStorage.setItem('elektro_final_v10', JSON.stringify(data));
    }

    function loadFromStorage() {
        const stored = JSON.parse(localStorage.getItem('elektro_final_v10'));
        document.getElementById('works-body').innerHTML = '';
        document.getElementById('mats-body').innerHTML = '';
        if (!stored) { addRow('works-body'); return; }
        document.getElementById('master-name').value = stored.masterName || '';
        document.getElementById('master-phone').value = stored.masterPhone || '';
        document.getElementById('client-name').value = stored.client || '';
        document.getElementById('phone').value = stored.phone || '+7 ';
        document.getElementById('address').value = stored.address || '';
        document.getElementById('discount').value = stored.discount || '0';
        stored.works.forEach(w => w.type === 'cat-row' ? addCategory(w.name) : addRow('works-body', w));
        stored.mats.forEach(m => addRow('mats-body', m));
        calculate();
    }

    function resetData() { if(confirm('Очистить всё?')) { localStorage.removeItem('elektro_final_v10'); location.reload(); } }

    function initRowEvents(row) {
        row.draggable = true;
        row.oncontextmenu = (e) => { e.preventDefault(); if(confirm('Удалить строку?')) { row.remove(); calculate(); } };
        row.addEventListener('dragstart', (e) => { if(e.target.tagName==='INPUT') e.preventDefault(); row.classList.add('dragging'); });
        row.addEventListener('dragend', () => { row.classList.remove('dragging'); calculate(); });
        row.addEventListener('dragover', (e) => {
            e.preventDefault();
            const draggingRow = document.querySelector('.dragging');
            if (draggingRow && draggingRow !== row) {
                const bounding = row.getBoundingClientRect();
                const offset = e.clientY - bounding.top - bounding.height / 2;
                row.parentNode.insertBefore(draggingRow, offset > 0 ? row.nextElementSibling : row);
            }
        });
    }

    function addRow(targetId, savedData = null) {
        const tbody = document.getElementById(targetId);
        const tr = document.createElement('tr');
        const isWorks = targetId === 'works-body';
        tr.className = isWorks ? 'work-row' : 'mat-row';
        let html = `<td><span class="drag-handler">⠿</span><input type="text" placeholder="Название..." class="input-name" value="${savedData?.name || ''}"><span class="name-text"></span></td>`;
        if (!isWorks) html += `<td><input type="text" placeholder="Арт./Модель" class="input-art" value="${savedData?.art || ''}"><span class="art-text"></span></td>`;
        html += `<td><input type="text" placeholder="ед." class="unit-inp" style="width:25px; border:none; border-bottom:1px dotted #ccc; font-size:11px;" value="${savedData?.unit || ''}"><span class="unit-text"></span></td>
            <td class="col-price"><input type="number" value="${savedData?.price || '0'}" class="input-custom unit-p"><span class="price-text"></span></td>
            <td><input type="number" value="${savedData?.qty || '0'}" class="input-qty"><span class="qty-text"></span></td>
            <td class="col-sum" style="text-align:right"><span class="row-sum">0</span> ₽</td>`;
        tr.innerHTML = html;
        initRowEvents(tr); tbody.appendChild(tr); calculate();
    }

    function addCategory(savedName = '') {
        const tr = document.createElement('tr'); tr.className = 'cat-row';
        tr.innerHTML = `<td colspan="6"><span class="drag-handler">⠿</span><input type="text" placeholder="НАЗВАНИЕ КАТЕГОРИИ" class="cat-input" value="${savedName}"><span class="cat-text"></span></td>`;
        initRowEvents(tr); document.getElementById('works-body').appendChild(tr); calculate();
    }

    function calculate() {
        let wSum = 0, mSum = 0;
        const mName = document.getElementById('master-name').value;
        const mPhone = document.getElementById('master-phone').value;
        document.getElementById('display-master-name').innerText = mName;
        document.getElementById('display-master-phone').innerText = mPhone;
        document.querySelector('.master-name-label').innerText = mName;
        document.querySelectorAll('tr.work-row, tr.mat-row').forEach(row => {
            const p = parseInt(row.querySelector('.unit-p').value) || 0, q = parseInt(row.querySelector('.input-qty').value) || 0, s = p * q;
            row.querySelector('.row-sum').innerText = s.toLocaleString();
            row.querySelector('.qty-text').innerText = q;
            row.querySelector('.price-text').innerText = p;
            row.querySelector('.name-text').innerText = row.querySelector('.input-name').value;
            row.querySelector('.unit-text').innerText = row.querySelector('.unit-inp').value;
            if (row.querySelector('.art-text')) row.querySelector('.art-text').innerText = row.querySelector('.input-art').value;
            if(q === 0) row.classList.add('zero-row'); else row.classList.remove('zero-row');
            if(row.classList.contains('work-row')) wSum += s; else mSum += s;
        });
        document.querySelectorAll('.cat-row').forEach(r => r.querySelector('.cat-text').innerText = r.querySelector('.cat-input').value.toUpperCase());
        const disc = parseInt(document.getElementById('discount').value);
        const wFinal = Math.round(wSum * (1 - disc/100));
        document.getElementById('res-works').innerText = wFinal.toLocaleString();
        document.getElementById('res-mats').innerText = mSum.toLocaleString();
        document.getElementById('res-total').innerText = (wFinal + mSum).toLocaleString() + ' ₽';
        saveToStorage();
    }

    document.body.addEventListener('input', calculate);
    window.onload = () => loadFromStorage();
</script>
</body>
</html>
