<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Электромонтаж - Смета (Drag-n-Drop)</title>
    <!-- Подключаем библиотеку для перетаскивания на телефонах -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; color: #333; background: #f0f2f5; padding-bottom: 100px; }
        .report-card { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .tabs-nav { display: flex; gap: 8px; margin-bottom: 15px; background: #eee; padding: 4px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.2s; font-size: 13px; }
        .tab-btn.active { background: #2c3e50; color: white; }
        
        .header { border-bottom: 3px solid #2c3e50; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { margin: 0; font-size: 18px; color: #2c3e50; text-transform: uppercase; }
        
        .client-block { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; }
        .client-block label { font-weight: bold; color: #666; font-size: 10px; text-transform: uppercase; }
        .client-block input { border: none; background: transparent; font-size: 14px; width: 100%; border-bottom: 1px solid #ddd; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th { background: #f4f6f8; padding: 10px 5px; text-align: left; font-size: 10px; border-bottom: 2px solid #2c3e50; }
        td { border-bottom: 1px solid #eee; padding: 8px 5px; font-size: 12px; position: relative; }
        
        /* Стили для перетаскивания */
        .drag-handler { cursor: grab; color: #3498db; padding-right: 10px; font-size: 20px; user-select: none; display: inline-block; }
        .dragging { background: #e3f2fd !important; opacity: 0.5; }

        .cat-row { background: #f1f1f1 !important; font-weight: bold; }
        .input-name { width: 80%; border: none; background: transparent; font-size: 12px; }
        .input-qty, .input-price { width: 50px; border: 1px dashed #ccc; text-align: center; border-radius: 4px; }
        
        .total-box { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; text-align: right; margin-top: 20px; }
        .total-box span { font-size: 24px; color: #2ecc71; font-weight: bold; }

        .action-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-add { background: #3498db; }
        .btn-cat { background: #95a5a6; }
        .btn-print { background: #2ecc71; width: 100%; font-size: 18px; margin-top: 10px; }

        @media print {
            .tabs-nav, .action-btns, .drag-handler, .btn-print, input { display: none !important; }
            .qty-text, .price-text, .name-text { display: inline !important; font-weight: bold; }
            .report-card { box-shadow: none; padding: 0; }
        }
        .qty-text, .price-text, .name-text { display: none; }
    </style>
</head>
<body>

<div class="report-card">
    <div class="header">
        <h1>Смета электромонтажа</h1>
        <div style="font-size: 12px;">Ижевск / Удмуртия</div>
    </div>

    <div class="client-block">
        <div><label>Заказчик</label><input type="text" placeholder="ФИО"></div>
        <div><label>Объект</label><input type="text" placeholder="Адрес"></div>
    </div>

    <div class="action-btns">
        <button class="btn btn-add" onclick="addRow()">+ Работа</button>
        <button class="btn btn-cat" onclick="addCategory()">+ Категория</button>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th style="width: 50%;">Наименование</th>
                <th style="width: 15%;">Цена</th>
                <th style="width: 15%;">Кол.</th>
                <th style="width: 20%;">Сумма</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- Начальные строки -->
            <tr>
                <td><span class="drag-handler">☰</span><input type="text" class="input-name" value="Штробление бетон"><span class="name-text"></span></td>
                <td><input type="number" class="input-price" value="550"><span class="price-text"></span></td>
                <td><input type="number" class="input-qty" value="0"><span class="qty-text"></span></td>
                <td class="row-total">0 ₽</td>
            </tr>
        </tbody>
    </table>

    <div class="total-box">
        ИТОГО: <span id="grand-total">0 ₽</span>
    </div>

    <button class="btn btn-print" onclick="window.print()">Сохранить в PDF</button>
</div>

<script>
    // Инициализация Drag-and-Drop
    const el = document.getElementById('table-body');
    new Sortable(el, {
        handle: '.drag-handler', 
        animation: 150,
        ghostClass: 'dragging'
    });

    // Функция добавления работы
    function addRow() {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><span class="drag-handler">☰</span><input type="text" class="input-name" placeholder="Новая работа..."><span class="name-text"></span></td>
            <td><input type="number" class="input-price" value="0"><span class="price-text"></span></td>
            <td><input type="number" class="input-qty" value="0"><span class="qty-text"></span></td>
            <td class="row-total">0 ₽</td>
        `;
        document.getElementById('table-body').appendChild(row);
        attachEvents(row);
    }

    // Функция добавления заголовка категории
    function addCategory() {
        const row = document.createElement('tr');
        row.className = 'cat-row';
        row.innerHTML = `
            <td colspan="4"><span class="drag-handler">☰</span> <input type="text" class="input-name" value="НОВАЯ КАТЕГОРИЯ" style="font-weight:bold"></td>
        `;
        document.getElementById('table-body').appendChild(row);
    }

    // Расчет суммы
    function recalc() {
        let total = 0;
        document.querySelectorAll('#table-body tr').forEach(row => {
            if (row.classList.contains('cat-row')) return;
            
            const p = parseFloat(row.querySelector('.input-price').value) || 0;
            const q = parseFloat(row.querySelector('.input-qty').value) || 0;
            const sum = p * q;
            
            row.querySelector('.row-total').innerText = sum.toLocaleString() + ' ₽';
            row.querySelector('.price-text').innerText = p;
            row.querySelector('.qty-text').innerText = q;
            row.querySelector('.name-text').innerText = row.querySelector('.input-name').value;
            
            total += sum;
        });
        document.getElementById('grand-total').innerText = total.toLocaleString() + ' ₽';
    }

    function attachEvents(row) {
        row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', recalc));
    }

    // Вешаем расчет на существующие строки
    document.querySelectorAll('#table-body tr').forEach(attachEvents);
</script>

</body>
</html>
